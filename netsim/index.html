<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="googcc.js"></script>
    <script src="circuit_breaker.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Network Simulator</h1>

    <div class="config-panel">
        <div class="config-section">
            <h3>Link A &rarr; B</h3>
            <div class="slider-row">
                <label>Bitrate (kbps)</label>
                <input type="range" id="linkab-bitrate" min="10" max="10000" value="1000" step="10">
                <span class="slider-val" id="linkab-bitrate-v">1000</span>
            </div>
            <div class="slider-row">
                <label>Max Queue (KB)</label>
                <input type="range" id="linkab-queue" min="1" max="500" value="100" step="1">
                <span class="slider-val" id="linkab-queue-v">100</span>
            </div>
            <div class="slider-row">
                <label>Latency (ms)</label>
                <input type="range" id="linkab-latency" min="0" max="500" value="50" step="1">
                <span class="slider-val" id="linkab-latency-v">50</span>
            </div>
            <div class="slider-row">
                <label>Random Loss (%)</label>
                <input type="range" id="linkab-rloss" min="0" max="50" value="1" step="0.1">
                <span class="slider-val" id="linkab-rloss-v">1.0</span>
            </div>
            <div class="slider-row">
                <label>Burst Loss Rate (%)</label>
                <input type="range" id="linkab-bloss" min="0" max="30" value="2" step="0.1">
                <span class="slider-val" id="linkab-bloss-v">2.0</span>
            </div>
        </div>

        <div class="config-section">
            <h3>Link B &rarr; A</h3>
            <div class="slider-row">
                <label>Bitrate (kbps)</label>
                <input type="range" id="linkba-bitrate" min="10" max="10000" value="1000" step="10">
                <span class="slider-val" id="linkba-bitrate-v">1000</span>
            </div>
            <div class="slider-row">
                <label>Max Queue (KB)</label>
                <input type="range" id="linkba-queue" min="1" max="500" value="100" step="1">
                <span class="slider-val" id="linkba-queue-v">100</span>
            </div>
            <div class="slider-row">
                <label>Latency (ms)</label>
                <input type="range" id="linkba-latency" min="0" max="500" value="50" step="1">
                <span class="slider-val" id="linkba-latency-v">50</span>
            </div>
            <div class="slider-row">
                <label>Random Loss (%)</label>
                <input type="range" id="linkba-rloss" min="0" max="50" value="0.5" step="0.1">
                <span class="slider-val" id="linkba-rloss-v">0.5</span>
            </div>
            <div class="slider-row">
                <label>Burst Loss Rate (%)</label>
                <input type="range" id="linkba-bloss" min="0" max="30" value="0" step="0.1">
                <span class="slider-val" id="linkba-bloss-v">0.0</span>
            </div>
        </div>

        <div class="config-section full-width">
            <h3>GoogCC</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:0 24px;">
                <div class="slider-row">
                    <label>Start Rate (kbps)</label>
                    <input type="range" id="cc-start" min="50" max="5000" value="300" step="10">
                    <span class="slider-val" id="cc-start-v">300</span>
                </div>
                <div class="slider-row">
                    <label>Max Rate (kbps)</label>
                    <input type="range" id="cc-max" min="100" max="20000" value="5000" step="10">
                    <span class="slider-val" id="cc-max-v">5000</span>
                </div>
                <div class="slider-row">
                    <label>Packet Size (bytes)</label>
                    <input type="range" id="pkt-size" min="64" max="9000" value="1200" step="1">
                    <span class="slider-val" id="pkt-size-v">1200</span>
                </div>
                <div class="slider-row">
                    <label>Duration (seconds)</label>
                    <input type="range" id="sim-dur" min="1" max="120" value="30" step="1">
                    <span class="slider-val" id="sim-dur-v">30</span>
                </div>
            </div>
        </div>
    </div>

    <div class="btn-row">
        <button id="run-btn">Run Simulation</button>
    </div>

    <div id="sim-info"></div>

    <div class="charts-area">
        <div class="chart-box"><canvas id="chart-cc-a"></canvas></div>
        <div class="chart-box"><canvas id="chart-cc-b"></canvas></div>
        <div class="chart-box"><canvas id="chart-cb-ab"></canvas></div>
        <div class="chart-box"><canvas id="chart-cb-ba"></canvas></div>
        <div class="chart-box"><canvas id="chart-ab"></canvas></div>
        <div class="chart-box"><canvas id="chart-ba"></canvas></div>
    </div>

    <div class="stats-row" id="stats-row" style="display:none;">
        <div class="stat-card" id="stats-ab"></div>
        <div class="stat-card" id="stats-ba"></div>
    </div>

    <script src="netsim.js"></script>
    <script src="main.js"></script>
</body>

</html>
